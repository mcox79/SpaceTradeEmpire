# SpaceTradeEmpire RL Training Configuration

environment:
  star_count: 12
  max_episode_ticks: 2000

training:
  algorithm: PPO
  total_timesteps: 500000
  n_envs: 4
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01

reward:
  # Reward component weights (computed in C# server Program.cs)
  w_profit: 1.0          # Credits delta / 1000, clamped [-1, 1]
  w_trade_bonus: 0.1     # Per profitable sell
  w_explore_bonus: 0.2   # Per new node visited
  w_time_penalty: -0.01  # Per step (urgency)
  w_death: -10.0         # Terminal: hull = 0
  w_bankruptcy: -5.0     # Terminal: credits <= 0
  w_victory: 20.0        # Terminal: win condition met

curriculum:
  enabled: true
  # Stage thresholds: mean reward over last 100 episodes to advance
  thresholds: [0.5, 1.0, 2.0]
  stages:
    - name: "basics"
      star_count: 4
      max_ticks: 500
      description: "Learn buy-travel-sell loop"
    - name: "multi_hop"
      star_count: 8
      max_ticks: 1000
      description: "Multi-hop trade routes"
    - name: "full_economy"
      star_count: 12
      max_ticks: 2000
      description: "Full 13-good economy"
    - name: "full_game"
      star_count: 12
      max_ticks: 2000
      description: "Full economy + combat"

evaluation:
  episodes: 50
  deterministic: true
  seeds_start: 10000
